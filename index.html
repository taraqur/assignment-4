<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Job Application Tracker</h1>
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-label">Total</span>
                    <span id="total-stat" class="stat-value total">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Interview</span>
                    <span id="interview-stat" class="stat-value interview">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Rejected</span>
                    <span id="rejected-stat" class="stat-value rejected">0</span>
                </div>
            </div>
        </header>

        <section class="available-jobs">
            <div class="section-header">
                <h2>Available Jobs</h2>
                <span id="job-count-text" class="job-count">0 jobs</span>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="all">All</button>
                <button class="tab-btn" data-tab="interview">Interview</button>
                <button class="tab-btn" data-tab="rejected">Rejected</button>
            </div>

            <div id="jobs-list" class="jobs-list">
                </div>

            <div id="no-jobs-msg" class="empty-state hidden">
                <div class="empty-icon"><img src="jobs.png" alt=""></div>
                <h3>No jobs Available</h3>
                <p>Check back soon for new job opportunities</p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
